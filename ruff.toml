target-version = "py312"
line-length = 110

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]

[lint.per-file-ignores]
"backend/api/routes/*.py" = ["B008"]  # Allow Depends() in function signatures (FastAPI pattern)
"backend/api/auth.py" = ["B008"]
"backend/api/test_new.py" = ["B008"]  # Test routes use Depends() inline
"backend/api/test.py" = ["B008"]
"backend/OCR/**" = ["N999"]  # Uppercase module name is intentional
"backend/OCR/ocr_corrector/prompts.py" = ["E501"]
"backend/OCR/ocr_corrector/SETTINGS_GUIDE.py" = ["ALL"]
